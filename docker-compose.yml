version: '3.8'

services:
  nginx:
    build:
      context: ./nginx
    ports:
      - "8081:80"
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      - PORT=5000
    env_file:
      - .env
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
